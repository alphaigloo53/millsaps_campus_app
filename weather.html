<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather | Millsaps Campus Life</title>

    <!--Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <!--Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Millsaps Campus Life</a>
        <div>
          <ul class="navbar-nav flex-row gap-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="events.html">Campus News</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="weather.html">Weather</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!--Page header -->
    <div class="container my-4">
      <h1 class="mb-1">Campus Weather</h1>
      <img src="images/spring-in-the-bowl-2017.jpg" 
             alt="Millsaps College Weather" 
             class="weather-img mt-3">
      <p class="text-muted">Current weather for Jackson, MS</p>
    </div>

    <!-- Button to get weather -->
    <div class="container mb-4">
      <button id="fetch-weather-btn" class="btn btn-primary">Get Current Weather</button>
    </div>

    <!-- Weather displayed -->
    <div class="container">

      <!--Weather card  -->
      <div id="weather-container" class="card p-4 mb-4" style="display: none;">
        <h3 id="weather-city" class="card-title"></h3>
        <p id="weather-description" class="text-muted"></p>
        <div class="row">
          <div class="col-md-3">
            <div class="card text-center p-3">
              <p class="mb-1 text-muted">Temperature</p>
              <h4 id="weather-temp"></h4>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-center p-3">
              <p class="mb-1 text-muted">Feels Like</p>
              <h4 id="weather-feels"></h4>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-center p-3">
              <p class="mb-1 text-muted">Humidity</p>
              <h4 id="weather-humidity"></h4>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-center p-3">
              <p class="mb-1 text-muted">Wind Speed</p>
              <h4 id="weather-wind"></h4>
            </div>
          </div>
        </div>
      </div>

      <!--Campus tip, based on weather-->
      <div id="tip-container" class="card p-3" style="display: none;">
        <h5>Campus Tip</h5>
        <p id="weather-tip" class="mb-0"></p>
      </div>

    </div>

    <!--Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p class="mb-0">Millsaps Campus Life App</p>
    </footer>

    <script src="js/weather.js"></script>

  </body>
</html>
