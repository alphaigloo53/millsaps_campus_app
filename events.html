<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus News | Millsaps Campus Life</title>

    <!--Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />

    <!--CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <!--Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Millsaps Campus Life</a>
        <div>
          <ul class="navbar-nav flex-row gap-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="events.html">Campus News</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="weather.html">Weather</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!--Page header -->
    <div class="container my-4">
      <h1 class="mb-1">Campus News</h1>
      <p class="text-muted">Latest college news fetched from NewsAPI</p>
    </div>

    <!--Search section-->
    <div class="container mb-4">
      <div class="row">
        <div class="col-md-6">
          <input type="text" id="search-input" class="form-control mb-2" placeholder="Search news (e.g. college, campus, students)" />
        </div>
        <div class="col-md-2">
          <button id="fetch-news-btn" class="btn btn-primary w-100">Search</button>
        </div>
      </div>
    </div>

    <!--This is where the news articles will be displayed -->
    <div class="container">
      <div id="news-container" class="row g-3">
        <p class="text-muted">Enter a search term and click Search to load news articles.</p>
      </div>
    </div>

    <!--Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p class="mb-0">Millsaps Campus Life App</p>
    </footer>

    <script src="js/events.js"></script>

  </body>
</html>
